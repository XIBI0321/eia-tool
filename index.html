<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环评数据处理系统（纯前端版）</title>
    <!-- Bootstrap 5 + ECharts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- SheetJS 用于解析 Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #f0f8ff; }
        .card { border-radius: 1rem; margin-bottom: 2rem; }
        .table-responsive { max-height: 400px; overflow-y: auto; }
        .badge-exceed { background-color: #dc3545; }
        .badge-pass { background-color: #198754; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="text-center mb-4">📊 环评报告数据处理系统</h1>
    <div class="card shadow">
        <div class="card-body">
            <h5 class="card-title">1. 上传监测数据文件</h5>
            <p class="text-muted">支持 .xlsx, .xls, .csv，文件需包含两列：<strong>pollutant</strong> (污染物名称) 和 <strong>value</strong> (监测值)</p>
            <input type="file" id="fileInput" class="form-control" accept=".xlsx,.xls,.csv">
            <button class="btn btn-primary mt-3" id="uploadBtn">开始处理</button>
        </div>
    </div>

    <div id="resultArea" style="display: none;">
        <div class="card shadow">
            <div class="card-body">
                <h5>📈 分析结果</h5>
                <div id="summaryPanel" class="alert alert-info"></div>
                <div id="chart" style="height: 400px;"></div>
                <hr>
                <h6>详细数据</h6>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped" id="resultTable">
                        <thead class="table-dark">
                            <tr><th>污染物</th><th>监测值</th><th>标准限值</th><th>标准来源</th><th>判定</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 标准库（可随时扩展）----------
    const STANDARDS = {
        "SO2":   { limit: 0.5,  source: "《环境空气质量标准》GB 3095-2012 二级小时平均" },
        "NOx":   { limit: 0.25, source: "《环境空气质量标准》GB 3095-2012 二级小时平均" },
        "PM10":  { limit: 0.15, source: "《环境空气质量标准》GB 3095-2012 二级24小时平均" },
        "PM2.5": { limit: 0.075,source: "《环境空气质量标准》GB 3095-2012 二级24小时平均" },
        "COD":   { limit: 100,  source: "《污水综合排放标准》GB 8978-1996 一级标准" },
        "NH3_N": { limit: 25,   source: "《污水综合排放标准》GB 8978-1996 一级标准" }
    };

    // 解析文件（Excel / CSV）
    function readFile(file) {
        return new Promise((resolve, reject) => {
            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();
            reader.onload = function(e) {
                if (ext === 'csv') {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/);
                    const headers = lines[0].split(',').map(h => h.trim());
                    const data = [];
                    for (let i = 1; i < lines.length; i++) {
                        if (lines[i].trim() === '') continue;
                        const values = lines[i].split(',');
                        let row = {};
                        headers.forEach((h, idx) => { row[h] = values[idx] ? values[idx].trim() : ''; });
                        data.push(row);
                    }
                    resolve(data);
                } else {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet);
                    resolve(rows);
                }
            };
            reader.onerror = reject;
            if (ext === 'csv') reader.readAsText(file);
            else reader.readAsArrayBuffer(file);
        });
    }

    // 处理数据并生成结果
    function processData(rawData) {
        // 自动识别列名（不区分大小写，允许 pollutant / value 多种写法）
        const firstRow = rawData[0];
        let polKey = Object.keys(firstRow).find(k => k.toLowerCase() === 'pollutant');
        let valKey = Object.keys(firstRow).find(k => k.toLowerCase() === 'value');
        if (!polKey || !valKey) {
            throw new Error('文件必须包含 "pollutant" 和 "value" 列（不区分大小写）');
        }

        const results = [];
        for (const row of rawData) {
            let pol = String(row[polKey]).trim();
            let val = parseFloat(row[valKey]);
            if (isNaN(val)) continue;

            const stdInfo = STANDARDS[pol] || null;
            let limit = stdInfo ? stdInfo.limit : null;
            let source = stdInfo ? stdInfo.source : '无对应标准';
            let status = '标准未定义';
            if (stdInfo) {
                status = val > limit ? '超标' : '达标';
            }
            results.push({
                pollutant: pol,
                value: val,
                standard: limit,
                source: source,
                status: status
            });
        }

        if (results.length === 0) throw new Error('没有有效数据行');

        // 统计
        const total = results.length;
        const exceed = results.filter(r => r.status === '超标').length;
        const passRate = ((total - exceed) / total * 100).toFixed(2);

        // 准备图表数据
        const pollutants = results.map(r => r.pollutant);
        const values = results.map(r => r.value);
        const standards = results.map(r => r.standard !== null ? r.standard : 0);

        return {
            details: results,
            summary: { total, exceed, passRate },
            chart: { pollutants, values, standards }
        };
    }

    // 渲染界面
    function renderResult(data) {
        document.getElementById('resultArea').style.display = 'block';
        // 汇总面板
        const summaryHtml = `
            <strong>✅ 总检测项：${data.summary.total}</strong><br>
            ❌ 超标项：${data.summary.exceed}<br>
            📉 达标率：${data.summary.passRate}%
        `;
        document.getElementById('summaryPanel').innerHTML = summaryHtml;

        // 表格
        const tbody = document.querySelector('#resultTable tbody');
        tbody.innerHTML = '';
        data.details.forEach(item => {
            const row = tbody.insertRow();
            row.classList.add(item.status === '超标' ? 'table-danger' : 'table-success');
            row.insertCell(0).innerText = item.pollutant;
            row.insertCell(1).innerText = item.value;
            row.insertCell(2).innerText = item.standard !== null ? item.standard : '—';
            row.insertCell(3).innerText = item.source;
            row.insertCell(4).innerText = item.status;
        });

        // 图表
        const chartDom = document.getElementById('chart');
        const myChart = echarts.init(chartDom);
        myChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['监测值', '标准限值'] },
            xAxis: { type: 'category', data: data.chart.pollutants, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value', name: '浓度 / 排放值' },
            series: [
                { name: '监测值', type: 'bar', data: data.chart.values, itemStyle: { color: '#ff7c43' } },
                { name: '标准限值', type: 'line', data: data.chart.standards, lineStyle: { color: 'red', width: 2 } }
            ]
        });
    }

    // 主按钮事件
    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) {
            alert('请先选择一个文件');
            return;
        }
        try {
            const rawData = await readFile(file);
            const result = processData(rawData);
            renderResult(result);
        } catch (err) {
            alert('处理出错：' + err.message);
            console.error(err);
        }
    });
</script>
</body>
</html>
